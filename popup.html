<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Confluence Edit Lock</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        margin: 0;
        padding: 12px 14px;
        width: 240px;
        color: #1f2328;
      }
      h1 {
        font-size: 13px;
        margin: 0 0 8px 0;
        font-weight: 600;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        border-bottom: 1px solid #eee;
      }
      .row:last-of-type {
        border-bottom: none;
      }
      .label {
        color: #57606a;
      }
      .value {
        font-variant-numeric: tabular-nums;
      }
      .value.on {
        color: #1f883d;
        font-weight: 600;
      }
      .value.off {
        color: #cf222e;
      }
      .controls {
        margin-top: 10px;
        display: flex;
        gap: 6px;
      }
      button {
        flex: 1;
        padding: 6px 8px;
        font-size: 12px;
        border: 1px solid #d0d7de;
        background: #f6f8fa;
        border-radius: 6px;
        cursor: pointer;
      }
      button.active {
        background: #0969da;
        color: white;
        border-color: #0969da;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #57606a;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Confluence Edit Lock</h1>
    <div class="row">
      <span class="label">当前状态</span>
      <span id="lockState" class="value">…</span>
    </div>
    <div class="row">
      <span class="label">URL 是编辑页</span>
      <span id="urlHint" class="value">…</span>
    </div>
    <div class="row">
      <span class="label">检测到编辑器</span>
      <span id="domHint" class="value">…</span>
    </div>
    <div class="controls">
      <button id="btnAuto">自动</button>
      <button id="btnOn">强制开</button>
      <button id="btnOff">强制关</button>
    </div>
    <div class="hint">自动模式：URL 含编辑标记 + 页面有编辑器 DOM 时启用。</div>
    <script src="popup.js"></script>
  </body>
</html>
